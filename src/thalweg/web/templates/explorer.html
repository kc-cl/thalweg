<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thalweg — Curve Explorer</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <header class="header">
    <h1>Curve Explorer</h1>
    <nav class="header-nav">
      <a href="/dashboard">Dashboard</a>
      <a href="/analytics">Analytics</a>
      <span class="date" id="header-date"></span>
    </nav>
  </header>

  <main class="explorer">
    <!-- Date controls -->
    <section class="explorer-controls">
      <div class="slider-row">
        <input type="range" id="date-slider" min="0" max="100" value="100" class="date-slider">
      </div>
      <div class="slider-info">
        <span id="slider-date-display" class="slider-date"></span>
        <div class="overlay-controls">
          <button id="add-overlay-btn" class="btn-small">+ Compare</button>
          <input type="date" id="overlay-date-input" class="overlay-input" style="display:none">
        </div>
      </div>
      <div id="overlay-chips" class="overlay-chips"></div>
    </section>

    <!-- Main curve chart -->
    <section class="panel explorer-chart-panel">
      <div class="panel-body" id="explorer-curves"></div>
      <div id="explorer-regimes" class="regime-badges" style="padding:8px 4px"></div>
    </section>

    <!-- Tenor history (appears on click) -->
    <section class="panel explorer-history-panel" id="history-panel" style="display:none">
      <div class="panel-title">
        <span id="history-title">Tenor History</span>
      </div>
      <div class="panel-body" id="history-chart"></div>
    </section>

    <!-- Spread time series (Task 6 placeholder) -->
    <section class="panel explorer-spreads-panel" id="spreads-panel" style="display:none">
      <div class="panel-title">Spread &amp; Slope History</div>
      <div class="spreads-controls" id="spreads-controls"></div>
      <div class="panel-body spreads-charts" id="spreads-charts"></div>
    </section>
  </main>

  <footer class="attribution">
    Source: Bank of Canada &middot;
    Source: U.S. Department of the Treasury &middot;
    Source: European Central Bank &middot;
    Source: Bank of England &middot;
    Source: Board of Governors of the Federal Reserve System
  </footer>

  <script src="/static/js/explorer.js"></script>
</body>
</html>
